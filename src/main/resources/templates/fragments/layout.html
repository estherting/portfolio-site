<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' — Portfolio'">Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=EB+Garamond:ital@0;1&family=Jost:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <meta name="_csrf" th:content="${_csrf?.token}"/>
    <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>
</head>
<body>

<!-- Small hand-drawn crest mark used in the header -->
<th:block th:fragment="crest">
<svg viewBox="0 0 48 48" class="crest" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="1"/>
  <path d="M24 14c2 3 2 6 0 9-2-3-2-6 0-9z" fill="currentColor"/>
  <path d="M24 34c-2-3-2-6 0-9 2 3 2 6 0 9z" fill="currentColor"/>
  <path d="M14 24c3-2 6-2 9 0-3 2-6 2-9 0z" fill="currentColor"/>
  <path d="M34 24c-3 2-6 2-9 0 3-2 6-2 9 0z" fill="currentColor"/>
</svg>
</th:block>

<th:block th:fragment="header(active)">
<header class="site-header">
  <div class="site-header-row">
    <a href="/" class="site-brand">
      <span class="site-name">Esther Ting</span>
    </a>
    <nav class="site-nav">
      <a href="/" th:classappend="${active == 'home'} ? 'active'">Home</a>
      <a href="/resume" th:classappend="${active == 'resume'} ? 'active'">Resume</a>
      <a href="/projects" th:classappend="${active == 'projects'} ? 'active'">Projects</a>
      <a href="/hobbies" th:classappend="${active == 'hobbies'} ? 'active'">Hobbies</a>
      <a href="/recipes" th:classappend="${active == 'recipes'} ? 'active'">Recipes</a>
    </nav>
  </div>
</header>
</th:block>

<th:block th:fragment="footer">
<footer class="site-footer">
  <div class="page-frame">
    <p>&copy; <span th:text="${#temporals.year(#temporals.createNow())}">2026</span> Esther Ting</p>
  </div>
</footer>
</th:block>

<!-- Signature botanical divider, reused between sections throughout the site -->
<th:block th:fragment="divider">
<div class="divider">
  <svg viewBox="0 0 140 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1">
    <line x1="0" y1="12" x2="55" y2="12"/>
    <line x1="85" y1="12" x2="140" y2="12"/>
    <path d="M70 12c-3-6-9-8-14-6 2 5 8 8 14 6z"/>
    <path d="M70 12c3-6 9-8 14-6-2 5-8 8-14 6z"/>
    <path d="M70 12c-3 6-9 8-14 6-2-5 8-8 14-6z" transform="rotate(180 70 12)"/>
    <circle cx="70" cy="12" r="2" fill="currentColor" stroke="none"/>
  </svg>
</div>
</th:block>

</body>
</html>
