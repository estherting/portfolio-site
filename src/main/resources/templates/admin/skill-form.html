<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${skill.id} != null ? 'Edit Skill' : 'New Skill')}"></head>
<body>
<div th:replace="~{fragments/admin-bar :: bar}"></div>

<main class="page-frame admin-shell">
  <h1 style="margin-top: var(--space-md);" th:text="${skill.id} != null ? 'Edit Skill' : 'New Skill'">Skill</h1>

  <form th:action="@{/admin/resume/skill/save}" th:object="${skill}" method="post">
    <input type="hidden" th:field="*{id}"/>
    <div class="form-field">
      <label for="name">Skill Name</label>
      <input type="text" id="name" th:field="*{name}" required/>
      <div class="form-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
    </div>
    <div class="form-field">
      <label for="category">Category <span style="text-transform:none;">(e.g. "Languages", "Tools", "Design")</span></label>
      <input type="text" id="category" th:field="*{category}"/>
    </div>
    <div class="form-field">
      <label for="sortOrder">Display Order</label>
      <input type="text" id="sortOrder" th:field="*{sortOrder}"/>
    </div>
    <div class="actions" style="justify-content: flex-start;">
      <button type="submit" class="btn primary">Save</button>
      <a class="btn" href="/admin/resume">Cancel</a>
    </div>
  </form>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
