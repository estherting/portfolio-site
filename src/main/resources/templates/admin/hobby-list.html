<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Hobbies')}"></head>
<body>
<div th:replace="~{fragments/admin-bar :: bar}"></div>

<main class="page-frame admin-shell">
  <div class="section-heading-row" style="margin-top: var(--space-md);">
    <h1>Hobbies</h1>
    <a class="btn primary" href="/admin/hobbies/new">+ New Hobby</a>
  </div>

  <table class="admin-table">
    <thead><tr><th>Title</th><th>Order</th><th></th></tr></thead>
    <tbody>
      <tr th:each="hobby : ${hobbies}">
        <td th:text="${hobby.title}">Title</td>
        <td th:text="${hobby.sortOrder}">0</td>
        <td class="row-actions">
          <a th:href="@{'/admin/hobbies/' + ${hobby.id} + '/edit'}">Edit</a>
          <form th:action="@{'/admin/hobbies/' + ${hobby.id} + '/delete'}" method="post"
                onsubmit="return confirm('Delete this hobby?');">
            <button type="submit" class="link-btn">Delete</button>
          </form>
        </td>
      </tr>
    </tbody>
  </table>
  <p th:if="${hobbies.isEmpty()}">No hobbies yet.</p>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
