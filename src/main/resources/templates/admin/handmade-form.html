<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${handmade.id} != null ? 'Edit Handmade Item' : 'New Handmade Item')}"></head>
<body>
<div th:replace="~{fragments/admin-bar :: bar}"></div>

<main class="page-frame admin-shell">
  <h1 style="margin-top: var(--space-md);" th:text="${handmade.id} != null ? 'Edit Handmade Item' : 'New Handmade Item'">Handmade Item</h1>

  <form th:action="@{/admin/handmade/save}" th:object="${handmade}" method="post" enctype="multipart/form-data">
    <input type="hidden" th:field="*{id}"/>

    <div class="form-field">
      <label for="title">Title</label>
      <input type="text" id="title" th:field="*{title}" required/>
      <div class="form-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
    </div>

    <div class="form-field">
      <label for="slug">Slug <span style="text-transform:none;">(optional — the detail page URL; generated from the title if left blank)</span></label>
      <input type="text" id="slug" th:field="*{slug}" placeholder="pressed-flower-art"/>
    </div>

    <div class="form-field">
      <label for="description">Short Description <span style="text-transform:none;">(shown on the card and at the top of the detail page)</span></label>
      <textarea id="description" th:field="*{description}"></textarea>
    </div>

    <div class="form-field">
      <label for="detail">Details <span style="text-transform:none;">(the full write-up shown on the detail page — line breaks are preserved)</span></label>
      <textarea id="detail" th:field="*{detail}" rows="12"
                placeholder="Tell the story of this piece: your process, the materials, what inspired it…"></textarea>
    </div>

    <div class="form-field">
      <label for="imageFile">Cover Image <span style="text-transform:none;">(optional — choose a file from your computer)</span></label>
      <input type="file" id="imageFile" name="imageFile" accept="image/*"/>
      <img th:if="${handmade.imageUrl != null and !handmade.imageUrl.isEmpty()}"
           th:src="${handmade.imageUrl}" alt="Current image"
           style="margin-top: var(--space-xs); max-width: 200px; height: auto; border-radius: 4px;"/>
    </div>

    <div class="form-field">
      <label for="imageUrl">Cover Image URL <span style="text-transform:none;">(optional — or paste a link to an image; an uploaded file above takes precedence)</span></label>
      <input type="text" id="imageUrl" th:field="*{imageUrl}" placeholder="https://..."/>
    </div>

    <div class="form-field">
      <label for="detailImageFiles">Additional Images <span style="text-transform:none;">(optional — select one or more files to add to this item's gallery)</span></label>
      <input type="file" id="detailImageFiles" name="detailImageFiles" accept="image/*" multiple/>

      <div class="admin-gallery-manage"
           th:if="${handmade.detailImages != null and !handmade.detailImages.isEmpty()}"
           style="margin-top: var(--space-sm);">
        <p style="text-transform:none; margin-bottom: var(--space-xs);">Current gallery images — tick to remove on save:</p>
        <div style="display:flex; flex-wrap:wrap; gap: var(--space-sm);">
          <label th:each="img : ${handmade.detailImages}"
                 style="display:flex; flex-direction:column; align-items:center; gap:4px; font-size:0.8rem;">
            <img th:src="${img}" alt="Gallery image"
                 style="max-width: 140px; height: auto; border-radius: 4px;"/>
            <span style="text-transform:none;">
              <input type="checkbox" name="removeDetailImages" th:value="${img}"/> Remove
            </span>
          </label>
        </div>
      </div>
    </div>

    <div class="form-field">
      <label for="sortOrder">Display Order <span style="text-transform:none;">(lower numbers show first)</span></label>
      <input type="text" id="sortOrder" th:field="*{sortOrder}"/>
    </div>

    <div class="actions" style="justify-content: flex-start;">
      <button type="submit" class="btn primary">Save Handmade Item</button>
      <a class="btn" href="/admin/handmade">Cancel</a>
    </div>
  </form>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
