<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Weekly Poll')}"></head>
<body>
<div th:replace="~{fragments/admin-bar :: bar}"></div>

<main class="page-frame admin-shell">
  <div class="section-heading-row" style="margin-top: var(--space-md);">
    <h1>Weekly Poll</h1>
    <a class="btn primary" href="/admin/polls/new">+ New Poll</a>
  </div>
  <p style="font-family: var(--font-label); font-size: 0.8rem; color: var(--color-sage); text-transform: uppercase; letter-spacing: 0.05em;">
    Only one poll is shown on the homepage at a time — mark a poll "active" to make it live.
  </p>

  <table class="admin-table">
    <thead><tr><th>Question</th><th>Options</th><th>Status</th><th>Responses</th><th></th></tr></thead>
    <tbody>
      <tr th:each="poll : ${polls}">
        <td th:text="${poll.question}">Question</td>
        <td th:text="${poll.optionAText + ' / ' + poll.optionBText}">A / B</td>
        <td>
          <span class="badge" th:if="${poll.active}">Active</span>
          <span class="badge draft" th:unless="${poll.active}">Inactive</span>
        </td>
        <td th:text="${resultsByPoll.get(poll.id).total}">0</td>
        <td class="row-actions">
          <a th:href="@{'/admin/polls/' + ${poll.id} + '/edit'}">Edit</a>
          <form th:action="@{'/admin/polls/' + ${poll.id} + '/activate'}" method="post" th:if="${!poll.active}" style="display:inline;">
            <button type="submit" class="link-btn" style="color: var(--color-wine);">Activate</button>
          </form>
          <form th:action="@{'/admin/polls/' + ${poll.id} + '/delete'}" method="post"
                onsubmit="return confirm('Delete this poll and all its responses? This cannot be undone.');">
            <button type="submit" class="link-btn">Delete</button>
          </form>
        </td>
      </tr>
    </tbody>
  </table>
  <p th:if="${polls.isEmpty()}">No polls yet — create your first weekly poll.</p>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
