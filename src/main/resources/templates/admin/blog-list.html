<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Journal')}"></head>
<body>
<div th:replace="~{fragments/admin-bar :: bar}"></div>

<main class="page-frame admin-shell">
  <div class="section-heading-row" style="margin-top: var(--space-md);">
    <h1>Journal Entries</h1>
    <a class="btn primary" href="/admin/blog/new">+ New Entry</a>
  </div>

  <table class="admin-table">
    <thead>
      <tr><th>Title</th><th>Status</th><th>Date</th><th></th></tr>
    </thead>
    <tbody>
      <tr th:each="post : ${posts}">
        <td th:text="${post.title}">Title</td>
        <td>
          <span class="badge" th:if="${post.published}">Published</span>
          <span class="badge draft" th:unless="${post.published}">Draft</span>
        </td>
        <td th:text="${#temporals.format(post.createdAt, 'd MMM yyyy')}">Date</td>
        <td class="row-actions">
          <a th:href="@{'/admin/blog/' + ${post.id} + '/edit'}">Edit</a>
          <a th:href="@{'/blog/' + ${post.slug}}" target="_blank">View</a>
          <form th:action="@{'/admin/blog/' + ${post.id} + '/delete'}" method="post"
                onsubmit="return confirm('Delete this entry? This cannot be undone.');">
            <button type="submit" class="link-btn">Delete</button>
          </form>
        </td>
      </tr>
    </tbody>
  </table>
  <p th:if="${posts.isEmpty()}">No journal entries yet.</p>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
