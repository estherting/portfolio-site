<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Recipes')}"></head>
<body>
<div th:replace="~{fragments/admin-bar :: bar}"></div>

<main class="page-frame admin-shell">
  <div class="section-heading-row" style="margin-top: var(--space-md);">
    <h1>Recipes</h1>
    <a class="btn primary" href="/admin/recipes/new">+ New Recipe</a>
  </div>

  <table class="admin-table">
    <thead>
      <tr><th>Title</th><th>Top ingredients</th><th></th></tr>
    </thead>
    <tbody>
      <tr th:each="recipe : ${recipes}">
        <td th:text="${recipe.title}">Title</td>
        <td th:text="${#strings.listJoin(recipe.topIngredients, ', ')}">Ingredients</td>
        <td class="row-actions">
          <a th:href="@{'/admin/recipes/' + ${recipe.id} + '/edit'}">Edit</a>
          <a th:href="@{'/recipes/' + ${recipe.slug}}" target="_blank">View</a>
          <form th:action="@{'/admin/recipes/' + ${recipe.id} + '/delete'}" method="post"
                onsubmit="return confirm('Delete this recipe? This cannot be undone.');">
            <button type="submit" class="link-btn">Delete</button>
          </form>
        </td>
      </tr>
    </tbody>
  </table>
  <p th:if="${recipes.isEmpty()}">No recipes yet.</p>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
