<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Hobbies')}"></head>
<body>
<div th:replace="~{fragments/layout :: header('hobbies')}"></div>

<main class="page-frame">
  <section class="hero">
    <span class="label eyebrow">Beyond Work</span>
    <h1>Hobbies &amp; Pastimes</h1>
    <p class="lede">A few of the things I like to spend my quiet hours on.</p>
  </section>

  <div th:replace="~{fragments/layout :: divider}"></div>

  <section class="hobby-grid">
    <div class="hobby-card" th:each="hobby : ${hobbies}">
      <img th:if="${hobby.imageUrl != null and !hobby.imageUrl.isEmpty()}" th:src="${hobby.imageUrl}" th:alt="${hobby.title}"/>
      <div class="placeholder-img" th:unless="${hobby.imageUrl != null and !hobby.imageUrl.isEmpty()}">
        <svg viewBox="0 0 40 40" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1">
          <path d="M20 10c1.5 2.5 1.5 5 0 7.5-1.5-2.5-1.5-5 0-7.5z"/>
          <path d="M12 20c2.5-1.5 5-1.5 7.5 0-2.5 1.5-5 1.5-7.5 0z"/>
          <path d="M28 20c-2.5-1.5-5-1.5-7.5 0 2.5 1.5 5 1.5 7.5 0z"/>
          <path d="M20 30c-1.5-2.5-1.5-5 0-7.5 1.5 2.5 1.5 5 0 7.5z"/>
        </svg>
      </div>
      <h3 th:text="${hobby.title}">Hobby Title</h3>
      <p th:text="${hobby.description}">Description</p>
    </div>
  </section>
  <p th:if="${hobbies.isEmpty()}">No hobbies added yet.</p>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
