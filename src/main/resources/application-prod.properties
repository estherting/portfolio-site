# Production profile — activated with SPRING_PROFILES_ACTIVE=prod
# All secrets are injected via environment variables; nothing sensitive lives here.

# ---- Server ----
server.port=8080

# ---- Database (embedded H2, file-based on the instance's persistent disk) ----
# Same engine as local dev; only the path differs. Lives outside any deploy
# folder so redeploys never touch it. Survives reboots/redeploys; lost only if
# the EC2 instance is terminated.
spring.datasource.url=jdbc:h2:file:/var/lib/portfolio/data/portfolio;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Auto-migrates the schema from entities on first boot, same as dev.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# ---- H2 console disabled in production ----
spring.h2.console.enabled=false

# ---- Thymeleaf (cache templates in production) ----
spring.thymeleaf.cache=true

# ---- File uploads ----
# Stored outside the deploy directory so redeploys never touch existing images.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
portfolio.upload.dir=/var/lib/portfolio/uploads

# ---- Admin bootstrap account ----
# Only used the first time the app starts (when no admin user exists yet).
# Set PORTFOLIO_ADMIN_USERNAME / PORTFOLIO_ADMIN_PASSWORD in the environment.
portfolio.admin.username=${PORTFOLIO_ADMIN_USERNAME}
portfolio.admin.password=${PORTFOLIO_ADMIN_PASSWORD}
