# Production profile — activated with SPRING_PROFILES_ACTIVE=prod
# All secrets are injected via environment variables; nothing sensitive lives here.

# ---- Server ----
server.port=8080

# ---- Database (managed PostgreSQL, e.g. AWS RDS) ----
# DB_URL example: jdbc:postgresql://my-instance.abc123.us-east-1.rds.amazonaws.com:5432/portfolio
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Auto-migrates the schema from entities on first boot, same as dev.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# ---- H2 console disabled in production ----
spring.h2.console.enabled=false

# ---- Thymeleaf (cache templates in production) ----
spring.thymeleaf.cache=true

# ---- File uploads ----
# Stored outside the deploy directory so redeploys never touch existing images.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
portfolio.upload.dir=/var/lib/portfolio/uploads

# ---- Admin bootstrap account ----
# Only used the first time the app starts (when no admin user exists yet).
# Set PORTFOLIO_ADMIN_USERNAME / PORTFOLIO_ADMIN_PASSWORD in the environment.
portfolio.admin.username=${PORTFOLIO_ADMIN_USERNAME}
portfolio.admin.password=${PORTFOLIO_ADMIN_PASSWORD}
