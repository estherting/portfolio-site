# ---- Server ----
server.port=8080

# ---- Database (H2 file-based, persists to ./data/portfolio.mv.db) ----
# To switch to Postgres or MySQL later, replace this whole block with your
# production datasource URL/username/password/driver and remove the H2 dependency.
spring.datasource.url=jdbc:h2:file:./data/portfolio;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Optional: H2 web console at /h2-console (dev only — remove before deploying publicly)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- Thymeleaf ----
spring.thymeleaf.cache=false

# ---- Admin bootstrap account ----
# Change this password before deploying! It is only used the very first time
# the app starts (when no admin user exists yet in the database).
portfolio.admin.username=admin
portfolio.admin.password=changeme123

# ---- File uploads (handmade/recipe/project images) ----
spring.servlet.multipart.max-file-size=10MB
# Larger than a single file so the Handmade gallery can upload several images in one submit.
spring.servlet.multipart.max-request-size=60MB
portfolio.upload.dir=uploads
